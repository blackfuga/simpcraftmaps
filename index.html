<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimpCraft Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #eee; font-family: sans-serif; overflow: hidden; }
    #map { width: 100vw; height: 100vh; background: #1a1a1a; }

    #hud {
      position: absolute; top: 12px; left: 50%;
      transform: translateX(-50%); z-index: 1000;
      background: rgba(0,0,0,0.8);
      border: 1px solid #333; border-radius: 8px;
      padding: 8px 18px; font-size: 13px;
      display: flex; gap: 20px; pointer-events: none;
    }
    #hud span { color: #888; }
    #hud b { color: #fff; }

    #coords {
      position: absolute; bottom: 10px; left: 10px;
      z-index: 1000; background: rgba(0,0,0,0.7);
      padding: 5px 12px; border-radius: 4px;
      font-size: 12px; color: #ccc; pointer-events: none;
      font-family: monospace;
    }

    #search-box {
      position: absolute; top: 12px; right: 12px;
      z-index: 1000; display: flex; gap: 6px;
    }
    #search-box input {
      background: rgba(0,0,0,0.8); border: 1px solid #444;
      color: #fff; padding: 6px 10px; border-radius: 6px;
      font-size: 13px; width: 200px; outline: none;
    }
    #search-box input::placeholder { color: #666; }
    #search-box button {
      background: rgba(0,0,0,0.8); border: 1px solid #444;
      color: #fff; padding: 6px 12px; border-radius: 6px;
      font-size: 13px; cursor: pointer;
    }
    #search-box button:hover { background: #222; }

    .leaflet-control-zoom a {
      background: rgba(0,0,0,0.8) !important;
      color: #fff !important;
      border-color: #333 !important;
    }

    .custom-marker {
      background: rgba(0,0,0,0.85);
      border: 1px solid #555;
      border-radius: 4px;
      padding: 3px 7px;
      font-size: 11px;
      color: #fff;
      white-space: nowrap;
      pointer-events: none;
    }
    .marker-icon {
      font-size: 18px;
      line-height: 1;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="hud">
  <div><span>Server </span><b>SimpCraft</b></div>
  <div><span>Dim </span><b>Overworld</b></div>
</div>

<div id="coords">X: 0  Z: 0</div>

<div id="search-box">
  <input type="text" id="coord-input" placeholder="X, Z  (e.g. 100, -200)" />
  <button onclick="goToCoords()">Go</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="markers.js"></script>
<script>

  // ── CONFIG ───────────────────────────────────
  const TILE_URL   = "tiles/{z}/{x}/{y}.png";
  const MIN_ZOOM   = -8;
  const MAX_ZOOM   = 7;    // match however high you generated tiles to
  const START_ZOOM = 2;

  // Pixel position in the image where Minecraft 0,0 (spawn) is
  // At zoom 0 the whole map is 1 tile (256px), so divide pixel offset by image size * 256
  const OFFSET_X = 4749;  // pixel X of spawn in original image / (imageWidth/256)
  const OFFSET_Z = 4839;  // pixel Z of spawn in original image / (imageHeight/256)

  // How many Minecraft blocks the full image represents
  const MAP_BLOCKS_X = 10000;
  const MAP_BLOCKS_Z = 10000;

  // Image size in pixels (from when you ran the tiler)
  const IMG_W = 9498;
  const IMG_H = 9677;

  // Scale: blocks per Leaflet unit at zoom 0
  // At zoom 0, image is scaled to 256px, so 1 leaflet unit = IMG_W/256 pixels = MAP_BLOCKS_X/(IMG_W/256*256) blocks
  const SCALE_X = MAP_BLOCKS_X / IMG_W;  // blocks per pixel
  const SCALE_Z = MAP_BLOCKS_Z / IMG_H;
  // ─────────────────────────────────────────────

  const map = L.map("map", {
    crs: L.CRS.Simple,
    minZoom: MIN_ZOOM,
    maxZoom: MAX_ZOOM,
    zoomControl: true,
  }).setView([-OFFSET_Z / (IMG_H / 256), OFFSET_X / (IMG_W / 256)], START_ZOOM);

  L.tileLayer(TILE_URL, {
    tileSize: 256,
    noWrap: true,
    attribution: "Xaero's World Map",
    errorTileUrl: "",
  }).addTo(map);

  // Convert Leaflet latlng to Minecraft coords
  function toMinecraft(latlng) {
    const leafletX = latlng.lng;
    const leafletZ = -latlng.lat;
    const pixelX = leafletX * (IMG_W / 256);
    const pixelZ = leafletZ * (IMG_H / 256);
    const mcX = Math.round((pixelX - OFFSET_X) * SCALE_X);
    const mcZ = Math.round((pixelZ - OFFSET_Z) * SCALE_Z);
    return { x: mcX, z: mcZ };
  }

  // Convert Minecraft coords to Leaflet latlng
  function toLeaflet(mcX, mcZ) {
    const pixelX = mcX / SCALE_X + OFFSET_X;
    const pixelZ = mcZ / SCALE_Z + OFFSET_Z;
    const leafletX = pixelX / (IMG_W / 256);
    const leafletZ = pixelZ / (IMG_H / 256);
    return [-leafletZ, leafletX];
  }

  // Coords display
  const coordsEl = document.getElementById("coords");
  map.on("mousemove", e => {
    const mc = toMinecraft(e.latlng);
    coordsEl.textContent = `X: ${mc.x}  Z: ${mc.z}`;
  });

  // Jump to Minecraft coords
  function goToCoords() {
    const val = document.getElementById("coord-input").value;
    const parts = val.split(",").map(s => s.trim());
    if (parts.length === 2) {
      const x = parseFloat(parts[0]);
      const z = parseFloat(parts[1]);
      if (!isNaN(x) && !isNaN(z)) {
        map.setView(toLeaflet(x, z), 4);
      }
    }
  }
  document.getElementById("coord-input").addEventListener("keydown", e => {
    if (e.key === "Enter") goToCoords();
  });

  // Load markers from markers.js
  if (typeof MARKERS !== "undefined") {
    MARKERS.forEach(m => {
      const pos = toLeaflet(m.x, m.z);
      const icon = L.divIcon({
        className: "",
        html: `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
                 <div class="marker-icon">${m.icon || "📍"}</div>
                 <div class="custom-marker">${m.name}</div>
               </div>`,
        iconAnchor: [0, 0],
      });
      L.marker(pos, { icon })
        .addTo(map)
        .bindPopup(`<b>${m.name}</b><br>X: ${m.x} Z: ${m.z}${m.desc ? "<br>" + m.desc : ""}`);
    });
  }

</script>
</body>
</html>
