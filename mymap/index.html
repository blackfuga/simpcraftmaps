<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Server Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #eee; font-family: sans-serif; overflow: hidden; }
    #map { width: 100vw; height: 100vh; background: #1a1a1a; }

    #hud {
      position: absolute; top: 12px; left: 50%;
      transform: translateX(-50%); z-index: 1000;
      background: rgba(0,0,0,0.8);
      border: 1px solid #333; border-radius: 8px;
      padding: 8px 18px; font-size: 13px;
      display: flex; gap: 20px; pointer-events: none;
    }
    #hud span { color: #888; }
    #hud b { color: #fff; }

    #coords {
      position: absolute; bottom: 10px; left: 10px;
      z-index: 1000; background: rgba(0,0,0,0.7);
      padding: 5px 12px; border-radius: 4px;
      font-size: 12px; color: #ccc; pointer-events: none;
      font-family: monospace;
    }

    #search-box {
      position: absolute; top: 12px; right: 12px;
      z-index: 1000; display: flex; gap: 6px;
    }
    #search-box input {
      background: rgba(0,0,0,0.8); border: 1px solid #444;
      color: #fff; padding: 6px 10px; border-radius: 6px;
      font-size: 13px; width: 180px; outline: none;
    }
    #search-box input::placeholder { color: #666; }
    #search-box button {
      background: rgba(0,0,0,0.8); border: 1px solid #444;
      color: #fff; padding: 6px 12px; border-radius: 6px;
      font-size: 13px; cursor: pointer;
    }
    #search-box button:hover { background: #222; }

    .leaflet-control-zoom a {
      background: rgba(0,0,0,0.8) !important;
      color: #fff !important;
      border-color: #333 !important;
    }
  </style>
</head>
<body>

<div id="hud">
  <div><span>Server </span><b>My Anarchy Server</b></div>
  <div><span>Dim </span><b>Overworld</b></div>
</div>

<div id="coords">X: 0  Z: 0</div>

<div id="search-box">
  <input type="text" id="coord-input" placeholder="X, Z  (e.g. 100, -200)" />
  <button onclick="goToCoords()">Go</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>

  // ── CONFIGURE HERE ──────────────────────────────
  // Change "My Anarchy Server" in the HUD above too
  const TILE_URL   = "tiles/{z}/{x}/{y}.png";
  const MIN_ZOOM   = -5;
  const MAX_ZOOM   = 5;
  const START_POS  = [0, 0];
  const START_ZOOM = 0;
  // ────────────────────────────────────────────────

  const map = L.map("map", {
    crs: L.CRS.Simple,
    minZoom: MIN_ZOOM,
    maxZoom: MAX_ZOOM,
    zoomControl: true,
  }).setView(START_POS, START_ZOOM);

  L.tileLayer(TILE_URL, {
    tileSize: 256,
    noWrap: true,
    attribution: "Xaero's World Map",
    errorTileUrl: "",
  }).addTo(map);

  // Coords display
  const coordsEl = document.getElementById("coords");
  map.on("mousemove", e => {
    const x = Math.round(e.latlng.lng);
    const z = Math.round(-e.latlng.lat);
    coordsEl.textContent = `X: ${x}  Z: ${z}`;
  });

  // Jump to coords
  function goToCoords() {
    const val = document.getElementById("coord-input").value;
    const parts = val.split(",").map(s => s.trim());
    if (parts.length === 2) {
      const x = parseFloat(parts[0]);
      const z = parseFloat(parts[1]);
      if (!isNaN(x) && !isNaN(z)) {
        map.setView([-z, x], 2);
      }
    }
  }
  document.getElementById("coord-input").addEventListener("keydown", e => {
    if (e.key === "Enter") goToCoords();
  });

  // Uncomment to auto-refresh tiles every 5 min (for live maps):
  // setInterval(() => tileLayer.redraw(), 5 * 60 * 1000);

</script>
</body>
</html>
